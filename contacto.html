<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contacto - Tu Complejo</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800">

  <header class="bg-indigo-800 text-white shadow-lg">
    <div class="container mx-auto px-6 py-4 flex justify-between items-center">
      <h1 class="text-2xl font-bold">Tu Complejo</h1>
      <nav>
        <ul class="flex gap-4">
          <li><a class="hover:text-indigo-200" href="index.html">Inicio</a></li>
          <li><a class="hover:text-indigo-200" href="departamentos.html">Departamentos</a></li>
          <li><a class="hover:text-indigo-200" href="servicios.html">Servicios</a></li>
          <li><a class="hover:text-indigo-200" href="contacto.html">Contacto</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="container mx-auto px-6 py-12">
    <h2 class="text-3xl font-bold text-center mb-8">Contacto</h2>

    <div class="grid md:grid-cols-2 gap-8">

      <!-- Formulario -->
      <div>
        <h3 class="text-xl font-semibold mb-4">Envianos tu consulta</h3>
        <form action="https://formsubmit.co/tuemail@gmail.com" method="POST" class="space-y-4">
          <input type="text" name="nombre" placeholder="Tu nombre" required class="w-full px-4 py-2 border rounded">
          <input type="email" name="email" placeholder="Tu email" required class="w-full px-4 py-2 border rounded">
          <input type="date" name="fecha" required class="w-full px-4 py-2 border rounded">
          <textarea name="mensaje" rows="4" placeholder="Mensaje" required class="w-full px-4 py-2 border rounded"></textarea>
          <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded">Enviar</button>
        </form>
      </div>

      <!-- Info + Mapa -->
      <div>
        <h3 class="text-xl font-semibold mb-4">¿Dónde estamos?</h3>
        <p class="mb-2"><strong>Dirección:</strong> Calle Falsa 123, Córdoba</p>
        <p class="mb-2"><strong>Tel:</strong> <a href="https://wa.me/5493515084648" class="text-green-600 hover:underline">+54 9 351 508-4648</a></p>
        <p class="mb-4"><strong>Email:</strong> info@tucomplejo.com</p>

        <iframe
          src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3405.0!d-64.0!d-31.0!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMzHCsDAwJzAwLjAiUyA2NMKwMDAnMDAuMCJX!5e0!3m2!1ses!2sar!4v1234567890"
          width="100%"
          height="250"
          style="border:0;"
          allowfullscreen=""
          loading="lazy"
          class="rounded shadow"
        ></iframe>
      </div>

    </div>
  </main>

  <!-- WhatsApp Flotante -->
  <a href="https://wa.me/5493515084648" target="_blank" class="fixed bottom-6 right-6 bg-green-500 hover:bg-green-600 text-white p-4 rounded-full shadow-lg">
    💬
  </a>

  <footer class="bg-indigo-900 text-white py-6 text-center">
    <p>&copy; 2025 Tu Complejo - Departamentos Temporarios</p>
  </footer>

</body>
</html>
